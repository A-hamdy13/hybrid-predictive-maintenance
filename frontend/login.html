<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Predictive Maintenance</title>
  <style>
    :root { --bg:#0f0f12; --surface:#18181c; --border:#2a2a30; --text:#e4e4e7; --muted:#71717a; --accent:#3b82f6; --red:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; }
    h1 { font-size:1.15rem; margin:0 0 .8rem; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:.45rem 0 .2rem; }
    input, button { width:100%; padding:.55rem .65rem; border-radius:6px; font-size:.92rem; }
    input { background:#121318; color:var(--text); border:1px solid var(--border); }
    button { margin-top:.8rem; border:none; background:var(--accent); color:white; cursor:pointer; }
    .muted { color:var(--muted); font-size:.8rem; margin-top:.7rem; white-space:pre-wrap; }
    .error { color:var(--red); font-size:.85rem; min-height:1.1rem; margin-top:.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Predictive Maintenance Login</h1>
    <label>Username</label>
    <input id="username" autocomplete="username" />
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" />
    <button id="btnLogin" type="button">Login</button>
    <div id="err" class="error"></div>
  </div>

  <script>
    const API = window.location.origin;
    const byId = (id) => document.getElementById(id);

    byId('btnLogin').onclick = async () => {
      byId('err').textContent = '';
      const username = byId('username').value.trim();
      const password = byId('password').value;
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          byId('err').textContent = data.detail || 'Login failed';
          return;
        }
        window.location.href = data.redirect_to || '/driver';
      } catch (e) {
        byId('err').textContent = e.message;
      }
    };
  </script>
</body>
</html>
